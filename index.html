<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>学习笔记 - Learn Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人学习笔记：前端、后端、人工智能等分类知识整理与复习。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">

  <!-- docsify 核心 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* 自建欢迎页样式（替代 docsify coverpage） */
    #welcome {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%);
      transition: opacity .3s ease, visibility .3s ease;
    }
    #welcome.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .welcome-inner { text-align: center; padding: 24px; }
    .welcome-inner h1 { font-size: 3rem; margin: 0 0 12px; color: #2c3e50; }
    .welcome-inner .lead { font-size: 1.2rem; color: #34495e; margin: 0 0 32px; }
    .welcome-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #42b983;
      color: #fff !important;
      border-radius: 4px;
      text-decoration: none;
      font-size: 1.1rem;
      transition: background .2s;
    }
    .welcome-btn:hover { background: #339966; }
    .welcome-inner .hint { margin-top: 24px; font-size: .85rem; color: #7f8c8d; }

    /* 右侧文章目录样式 */
    .right-toc {
      position: fixed;
      top: 60px;
      right: 0;
      width: 220px;
      height: calc(100vh - 60px);
      padding: 16px 12px 16px 0;
      overflow-y: auto;
      font-size: 13px;
      border-left: 1px solid #eee;
      background: #fff;
      z-index: 20;
      display: none;
    }
    .right-toc.show { display: none; }
    .right-toc-title {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
      padding-left: 12px;
    }
    .right-toc ul { list-style: none; padding-left: 0; margin: 0; }
    .right-toc li { margin: 0; }
    .right-toc a {
      display: block;
      padding: 4px 12px;
      color: #666;
      text-decoration: none;
      line-height: 1.5;
      border-left: 2px solid transparent;
      transition: all .15s;
    }
    .right-toc a:hover { color: #42b983; }
    .right-toc a.active { color: #42b983; border-left-color: #42b983; }
    .right-toc .toc-h3 { padding-left: 24px; }
    .right-toc .toc-h4 { padding-left: 36px; }

    /* 移动端目录浮动按钮 */
    .toc-fab {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #42b983;
      color: #fff;
      font-size: 20px;
      line-height: 44px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      cursor: pointer;
      z-index: 30;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .toc-fab:active { background: #339966; }

    /* 移动端目录弹窗遮罩 */
    .toc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 25;
    }
    .toc-overlay.show { display: block; }

    /* 桌面端：右侧固定目录 */
    /* markdown-section 主内容区与 sidebar/右侧目录的留白 */
    .markdown-section {
      max-width: 900px !important;
      padding: 30px 32px 40px 32px !important;
      box-sizing: border-box;
    }
    body.show-toc .markdown-section { padding-right: 24px !important; }

    @media (min-width: 1200px) {
      .right-toc.show { display: block; }
      body.show-toc .content { padding-right: 230px !important; }
      body.show-toc .markdown-section { max-width: none !important; padding-right: 16px !important; }
      .toc-fab { display: none !important; }
      .toc-overlay { display: none !important; }
    }
    /* 移动端：浮动按钮 + 弹窗 */
    @media (max-width: 1199px) {
      .right-toc {
        display: none;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 85vw;
        max-width: 360px;
        height: 70vh;
        border-left: none;
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(0,0,0,.15);
        z-index: 30;
        padding: 16px;
      }
      .right-toc.mobile-show {
        display: block;
      }
      .content,
      .markdown-section { padding-right: 0 !important; }
      .toc-fab { display: block; }
    }
  </style>
</head>
<body>
  <!-- 自建欢迎页（替代 docsify coverpage，避免 ?id= 路由在某些环境下不收敛） -->
  <div id="welcome">
    <div class="welcome-inner">
      <h1>学习笔记 📚</h1>
      <p class="lead">沉淀知识 · 精简复习 · 持续更新</p>
      <a class="welcome-btn" href="#/README">开始阅读 🚀</a>
      <p class="hint">GitHub Pages 部署中可直接进入首页，本地服务亦同</p>
    </div>
  </div>

  <div id="app">加载中...</div>

  <!-- 右侧文章目录容器 -->
  <div class="right-toc" id="right-toc">
    <div class="right-toc-title">本文目录</div>
    <ul id="right-toc-list"></ul>
  </div>

  <!-- 移动端目录弹窗遮罩 -->
  <div class="toc-overlay" id="toc-overlay"></div>

  <!-- 移动端目录浮动按钮 -->
  <div class="toc-fab" id="toc-fab">&#9776;</div>

  <script>
    // 动态判断 basePath：GitHub Pages 子路径部署用 /learn_code/，本地或自定义域名用 /
    (function () {
      var isGhPages = /\.github\.io$/.test(location.hostname) && location.pathname.indexOf('/learn_code') === 0;
      window.$docsify = {
        name: '学习笔记',
        nameLink: '#/',
        repo: '',
        basePath: isGhPages ? '/learn_code/' : '/',
        loadSidebar: true,
        loadNavbar: true,
        maxLevel: 4,
        subMaxLevel: 2,
        search: 'auto',
        pagination: {
          previousText: '上一篇',
          nextText: '下一篇',
          crossChapter: true,
          crossChapterText: true
        },
        copyCode: {
          buttonText: '复制',
          errorText: '复制失败',
          successText: '已复制'
        }
      };
    })();
  </script>

  <!-- docsify 脚本与插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>

  <!-- 右侧文章目录插件 -->
  <script>
    (function () {
      var tocContainer = document.getElementById('right-toc');
      var tocList = document.getElementById('right-toc-list');

      // 使用 docsify 钩子：每次页面路由变化后重新生成目录
      function buildToc() {
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        var headings = content.querySelectorAll('h2, h3, h4');
        tocList.innerHTML = '';
        if (headings.length === 0) {
          tocContainer.classList.remove('show');
          document.body.classList.remove('show-toc');
          return;
        }
        headings.forEach(function (h) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          // 用 data-id 存储锚点，点击时滚动定位而非 hash 导航，避免 docsify 误判为新页面
          a.setAttribute('data-id', h.id || '');
          a.href = 'javascript:void(0)';
          a.textContent = h.textContent;
          a.className = 'toc-' + h.tagName.toLowerCase();
          a.addEventListener('click', function (e) {
            e.preventDefault();
            var target = document.getElementById(this.getAttribute('data-id'));
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          li.appendChild(a);
          tocList.appendChild(li);
        });
        tocContainer.classList.add('show');
        document.body.classList.add('show-toc');
        highlightToc();
      }

      // 高亮当前滚动位置对应的目录项
      function highlightToc() {
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        var headings = content.querySelectorAll('h2, h3, h4');
        var scrollTop = content.scrollTop || document.documentElement.scrollTop || document.body.scrollTop;
        var activeId = '';
        headings.forEach(function (h) {
          if (h.offsetTop <= scrollTop + 80) {
            activeId = h.id || '';
          }
        });
        var links = tocList.querySelectorAll('a');
        links.forEach(function (a) {
          a.classList.remove('active');
          if (a.getAttribute('data-id') === activeId) {
            a.classList.add('active');
          }
        });
      }

      // 监听滚动，更新高亮
      window.addEventListener('scroll', highlightToc, false);

      // 移动端：浮动按钮打开/关闭目录弹窗
      var fab = document.getElementById('toc-fab');
      var overlay = document.getElementById('toc-overlay');
      function closeMobileToc() {
        tocContainer.classList.remove('mobile-show');
        overlay.classList.remove('show');
      }
      fab.addEventListener('click', function () {
        var isOpen = tocContainer.classList.contains('mobile-show');
        if (isOpen) {
          closeMobileToc();
        } else {
          tocContainer.classList.add('mobile-show');
          overlay.classList.add('show');
        }
      });
      overlay.addEventListener('click', closeMobileToc);

      // 移动端点击目录项后自动关闭弹窗
      tocList.addEventListener('click', function (e) {
        if (e.target.tagName === 'A' && window.innerWidth < 1200) {
          closeMobileToc();
        }
      });

      // docsify mountedEachContent 钩子：内容挂载后重建目录
      if (!window.$docsify.plugins) window.$docsify.plugins = [];
      window.$docsify.plugins.push(function (hook) {
        hook.doneEach(function () {
          setTimeout(buildToc, 100);
        });
      });
    })();
  </script>

  <script>
    // 欢迎页 → docsify 路由衔接
    (function () {
      var welcome = document.getElementById('welcome');
      function hideWelcome() { if (welcome) welcome.classList.add('hide'); }
      // 1. 直接进入时若 URL 已是文档路径（#/README 等），立即关闭欢迎页
      if (location.hash && location.hash !== '#/' && location.hash !== '#') {
        hideWelcome();
      }
      // 2. 监听欢迎页按钮点击：阻止默认行为，强制 docsify 重新走 hash 路由
      if (welcome) {
        welcome.addEventListener('click', function (e) {
          var a = e.target.closest('a.welcome-btn');
          if (!a) return;
          e.preventDefault();
          // 用纯 hash 赋值（不走 ?id= 形式），确保 Live Server / 本地服务都能正确触发
          var href = a.getAttribute('href') || '#/README';
          location.hash = href;
          hideWelcome();
        });
      }
      // 3. 兜底：任何 hash 变化都关掉欢迎页
      window.addEventListener('hashchange', hideWelcome);
    })();
  </script>
</body>
</html>
